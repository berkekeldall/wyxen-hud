<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            /* Lua'dan gelen bina/taraf rengini tutacak değişken */
            --fac-color: #ffffff; 
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: transparent; 
            font-family: 'Arial', sans-serif; 
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .glass-panel {
            background-color: rgba(20, 22, 26, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.6);
        }

        /* --- SOL ÜST: DISCORD EFEKTİ --- */
        #top-left-container {
            position: absolute;
            top: 15px; left: 15px;
            display: none; /* Lua'dan gelen sinyalle açılır */
            align-items: center;
            padding: 8px 14px;
            gap: 10px;
            border-radius: 8px;
            /* Discord mavisine hafif bir degrade ve parlama (Glow) efekti */
            background: linear-gradient(90deg, rgba(88, 101, 242, 0.25), rgba(20, 22, 26, 0.4));
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); 
            border: 1px solid rgba(88, 101, 242, 0.3);
            backdrop-filter: blur(8px);
        }
        .dc-icon {
            width: 26px; height: 26px;
            filter: drop-shadow(0px 0px 6px rgba(88, 101, 242, 0.9));
        }
        .discord-text {
            font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #fff;
        }

        /* --- SAĞ ÜST: GÖRSELLİ BİLGİ PANELİ --- */
        #top-right-container {
            position: absolute;
            top: 15px; right: 15px;
            display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
            display: none; 
        }
        .info-row {
            padding: 6px 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold;
        }
        .info-icon {
            width: 16px; height: 16px;
            /* Yüklediğin PNG ikonları bina renginde parlatacak sihirli kod */
            filter: drop-shadow(0px 0px 5px var(--fac-color)); 
        }
        .text-muted { color: #aaa; font-weight: normal; margin: 0 4px; }
    </style>
</head>
<body>

    <div id="top-left-container">
        <img src="icons/discord.png" class="dc-icon" alt="DC">
        <span class="discord-text">dc.gg/wyxen</span>
    </div>

    <div id="top-right-container">
        <div class="glass-panel info-row">
            <img src="icons/user.png" class="info-icon">
            <span id="tr-id">0</span>
            <span id="tr-name">Oyuncu Adı</span>
        </div>
        <div class="glass-panel info-row">
            <img src="icons/clock.png" class="info-icon">
            <span id="tr-realtime">00:00</span>
            <span class="text-muted">•</span>
            <img src="icons/calendar.png" class="info-icon" style="margin-left: 4px;">
            <span id="tr-realdate">00.00.0000</span>
        </div>
        <div class="glass-panel info-row">
            <img src="icons/gametime.png" class="info-icon">
            <span id="tr-gametime">00:00</span>
        </div>
    </div>

    <script>
        function ToggleSectors(showTopLeft, showTopRight) {
            document.getElementById('top-left-container').style.display = showTopLeft ? 'flex' : 'none';
            document.getElementById('top-right-container').style.display = showTopRight ? 'flex' : 'none';
        }

        function UpdateTopRight(id, name, realTime, realDate, gameTime, hexColor) {
            document.getElementById('tr-id').innerText = id;
            document.getElementById('tr-name').innerText = name;
            document.getElementById('tr-realtime').innerText = realTime;
            document.getElementById('tr-realdate').innerText = realDate;
            document.getElementById('tr-gametime').innerText = gameTime;
            
            // Tüm ikonların arkasına düşecek parlama rengini (faction color) belirliyoruz
            document.documentElement.style.setProperty('--fac-color', hexColor);
        }
    </script>
</body>
</html>
