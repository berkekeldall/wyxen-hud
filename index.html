<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: transparent; /* Oyunun arkasını gösterir */
            font-family: 'Arial', sans-serif; /* Aptos benzeri temiz font */
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }

        #hud-container {
            position: absolute;
            bottom: 40px; 
            left: 20px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bar-container {
            background-color: rgba(20, 22, 26, 0.5); /* Yarı saydam arka plan */
            backdrop-filter: blur(8px); /* SİHİRLİ BLUR EFEKTİ */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.7);
            display: none; /* Veri gelene kadar gizli */
            transition: opacity 0.3s ease;
        }

        .bar-header {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .bar-bg {
            width: 100%;
            height: 12px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0px 0px 5px rgba(0,0,0,0.8);
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: width 0.2s ease-out; /* Barların yumuşakça kaymasını sağlar */
        }

        /* Renkler ve Parlamalar (Glow) */
        #fill-health { background: linear-gradient(90deg, #28a745, #54e346); box-shadow: 0 0 10px rgba(84, 227, 70, 0.7); }
        #fill-armor { background: linear-gradient(90deg, #0056b3, #00d2ff); box-shadow: 0 0 10px rgba(0, 210, 255, 0.7); }
        #fill-hunger { background: linear-gradient(90deg, #d35400, #f39c12); box-shadow: 0 0 10px rgba(243, 156, 18, 0.7); }
        #fill-thirst { background: linear-gradient(90deg, #0984e3, #74b9ff); box-shadow: 0 0 10px rgba(116, 185, 255, 0.7); }
        #fill-sleep { background: linear-gradient(90deg, #6c5ce7, #a29bfe); box-shadow: 0 0 10px rgba(162, 155, 254, 0.7); }
        #fill-wand { background: linear-gradient(90deg, #b33939, #ff5252); box-shadow: 0 0 12px rgba(255, 82, 82, 0.9); }
        
        .timer-text { font-size: 12px; color: #f1c40f; }
    </style>
</head>
<body>

    <div id="hud-container">
        <div class="bar-container" id="box-wand">
            <div class="bar-header">
                <span id="txt-wand-name">Büyü Bekleniyor</span>
                <span id="txt-wand-val" class="timer-text">Hazır</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-wand"></div></div>
        </div>

        <div class="bar-container" id="box-health" style="display: block;">
            <div class="bar-header">
                <span>Sağlık</span>
                <span id="txt-health-val">100</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-health"></div></div>
        </div>

        <div class="bar-container" id="box-armor">
            <div class="bar-header">
                <span>Zırh</span>
                <span id="txt-armor-val">0</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-armor"></div></div>
        </div>

        <div class="bar-container" id="box-hunger">
            <div class="bar-header">
                <span>Açlık</span>
                <span id="txt-hunger-val">100</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-hunger"></div></div>
        </div>

        <div class="bar-container" id="box-thirst">
            <div class="bar-header">
                <span>Susuzluk</span>
                <span id="txt-thirst-val">100</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-thirst"></div></div>
        </div>

        <div class="bar-container" id="box-sleep">
            <div class="bar-header">
                <span>Enerji</span>
                <span id="txt-sleep-val">100</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="fill-sleep"></div></div>
        </div>
    </div>

    <script>
        // Lua'dan gelen verileri işleyen ve barları kaydıran ana fonksiyon
        function UpdateHUD(type, val, maxVal, labelText, forceShow) {
            let box = document.getElementById('box-' + type);
            let fill = document.getElementById('fill-' + type);
            let txt = document.getElementById('txt-' + type + '-val');

            // Bar doluysa ve forceShow false ise gizle (Eski mantığın aynısı)
            if (!forceShow && val >= maxVal && type !== 'health') {
                box.style.display = 'none';
                return;
            } else {
                box.style.display = 'block';
            }

            // Yüzde hesapla ve CSS genişliğini güncelle
            let percent = Math.max(0, Math.min(100, (val / maxVal) * 100));
            fill.style.width = percent + '%';

            // Yazıyı güncelle
            if (labelText !== undefined) {
                txt.innerText = labelText;
            } else {
                txt.innerText = Math.round(val);
            }
        }

        // Büyü Barı için özel fonksiyon
        function UpdateWand(spellName, percent, timerStr, isVisible) {
            let box = document.getElementById('box-wand');
            if (!isVisible) {
                box.style.display = 'none';
                return;
            }
            box.style.display = 'block';
            document.getElementById('txt-wand-name').innerText = spellName;
            document.getElementById('txt-wand-val').innerText = timerStr;
            document.getElementById('fill-wand').style.width = percent + '%';
        }
    </script>
</body>
</html>
