<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --fac-color: #ffffff; 
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: transparent; 
            font-family: 'Arial', sans-serif; 
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        #top-left-container {
            position: absolute; top: 15px; left: 15px;
            display: none; align-items: center; gap: 10px;
        }
        .dc-icon { width: 28px; height: 28px; }
        .discord-text { font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #fff; }
        
        /* --- SAĞ ÜST: TAMAMEN ORTALANDI --- */
        #top-right-container {
            position: absolute; top: 15px; right: 15px;
            display: flex; flex-direction: column; gap: 6px; 
            align-items: center; /* Tümü tam ortaya hizalandı */
            min-width: 160px; /* Ortalamanın düzgün durması için genişlik verildi */
            display: none; 
        }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: bold; justify-content: center; }
        .info-icon { width: 20px; height: 20px; }
        .text-muted { color: #ccc; font-weight: normal; margin: 0 2px; }
        
        /* Simetrik Çizgi: Her iki uç şeffaf, ortası parlak */
        .separator {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--fac-color), transparent);
            box-shadow: 0px 0px 4px var(--fac-color);
            opacity: 0.8; margin: 2px 0;
            border-radius: 2px;
        }

        #bottom-left-container {
            position: absolute; bottom: 30px; left: 15px;
            width: 240px; display: flex; flex-direction: column; gap: 10px; display: none;
        }
        .bar-wrapper {
            display: none; background-color: rgba(15, 17, 20, 0.6);
            border-left: 3px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px; border-radius: 4px; transition: opacity 0.3s;
        }
        .bar-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px; }
        .bar-track { width: 100%; height: 6px; background-color: rgba(0,0,0,0.7); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.2s linear; }
        #fill-health { background-color: #2ecc71; }
        #fill-hunger { background-color: #e67e22; }
        #fill-thirst { background-color: #3498db; }
        #fill-sleep { background-color: #9b59b6; }
        #fill-wand { background-color: #e74c3c; }
        .highlight-text { color: #f1c40f; }
        
        #voice-container {
            position: absolute; bottom: 30px; right: 30px;
            display: none; flex-direction: column; align-items: center; gap: 8px;
        }
        .voice-circle {
            width: 50px; height: 50px; background-color: rgba(20, 22, 26, 0.8);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            position: relative; transition: background-color 0.15s ease-out, box-shadow 0.15s ease-out;
            --voice-color: #ffffff;
        }
        .voice-circle.talking {
            background-color: var(--voice-color);
            box-shadow: 0px 0px 15px var(--voice-color);
        }
        .voice-icon { width: 26px; height: 26px; position: absolute; transition: opacity 0.15s ease-out; }
        #voice-icon-active { opacity: 0; }
        .voice-bars { display: flex; gap: 4px; }
        .v-bar { width: 14px; height: 6px; background-color: rgba(60, 60, 65, 0.6); border-radius: 2px; transition: background-color 0.15s; }
    </style>
</head>
<body>
    <div id="top-left-container">
        <img src="icons/discordicon.png" class="dc-icon" alt="DC">
        <span class="discord-text">dc.gg/wyxen</span>
    </div>
    
    <div id="top-right-container">
        <div class="info-row"><img src="icons/manicon.png" class="info-icon"><span id="tr-id">0</span><span id="tr-name">Oyuncu Adı</span></div>
        <div class="separator"></div>
        <div class="info-row"><img src="icons/timeicon.png" class="info-icon"><span id="tr-realtime">00:00</span><span class="text-muted">•</span><img src="icons/takvimicon.png" class="info-icon" style="margin-left: 4px;"><span id="tr-realdate">00.00.0000</span></div>
        <div class="separator"></div>
        <div class="info-row"><img src="icons/gametimeicon.png" class="info-icon"><span id="tr-gametime">00:00</span></div>
    </div>
    
    <div id="bottom-left-container">
        <div class="bar-wrapper" id="box-wand">
            <div class="bar-info"><span id="txt-wand-name">Büyü</span><span id="txt-wand-val" class="highlight-text">Hazır</span></div>
            <div class="bar-track"><div class="bar-fill" id="fill-wand"></div></div>
        </div>
        <div class="bar-wrapper" id="box-health" style="display: block;">
            <div class="bar-info"><span>Sağlık</span><span id="txt-health-val">100</span></div>
            <div class="bar-track"><div class="bar-fill" id="fill-health"></div></div>
        </div>
        <div class="bar-wrapper" id="box-hunger">
            <div class="bar-info"><span>Açlık</span><span id="txt-hunger-val">100</span></div>
            <div class="bar-track"><div class="bar-fill" id="fill-hunger"></div></div>
        </div>
        <div class="bar-wrapper" id="box-thirst">
            <div class="bar-info"><span>Susuzluk</span><span id="txt-thirst-val">100</span></div>
            <div class="bar-track"><div class="bar-fill" id="fill-thirst"></div></div>
        </div>
        <div class="bar-wrapper" id="box-sleep">
            <div class="bar-info"><span>Uykusuzluk</span><span id="txt-sleep-val">100</span></div>
            <div class="bar-track"><div class="bar-fill" id="fill-sleep"></div></div>
        </div>
    </div>
    
    <div id="voice-container">
        <div class="voice-circle" id="voice-circle">
            <img src="icons/micon.png" id="voice-icon-idle" class="voice-icon">
            <img src="icons/micoff.png" id="voice-icon-active" class="voice-icon">
        </div>
        <div class="voice-bars">
            <div class="v-bar" id="v-bar-1"></div>
            <div class="v-bar" id="v-bar-2"></div>
            <div class="v-bar" id="v-bar-3"></div>
        </div>
    </div>
    
    <script>
        function ToggleSectors(showTopLeft, showTopRight, showBottomLeft, showVoice) {
            document.getElementById('top-left-container').style.display = showTopLeft ? 'flex' : 'none';
            document.getElementById('top-right-container').style.display = showTopRight ? 'flex' : 'none';
            document.getElementById('bottom-left-container').style.display = showBottomLeft ? 'flex' : 'none';
            document.getElementById('voice-container').style.display = showVoice ? 'flex' : 'none';
        }
        function UpdateTopRight(id, name, realTime, realDate, gameTime, hexColor) {
            document.getElementById('tr-id').innerText = id;
            document.getElementById('tr-name').innerText = name;
            document.getElementById('tr-realtime').innerText = realTime;
            document.getElementById('tr-realdate').innerText = realDate;
            document.getElementById('tr-gametime').innerText = gameTime;
            document.documentElement.style.setProperty('--fac-color', hexColor);
        }
        function UpdateBar(type, val, maxVal, labelText, forceShow) {
            let box = document.getElementById('box-' + type);
            let fill = document.getElementById('fill-' + type);
            let txt = document.getElementById('txt-' + type + '-val');
            if (!forceShow && val >= maxVal && type !== 'health') {
                box.style.display = 'none'; return;
            } else { box.style.display = 'block'; }
            let percent = Math.max(0, Math.min(100, (val / maxVal) * 100));
            fill.style.width = percent + '%';
            txt.innerText = labelText !== undefined ? labelText : Math.round(val);
        }
        function UpdateWand(spellName, percent, timerStr, isVisible) {
            let box = document.getElementById('box-wand');
            if (!isVisible) { box.style.display = 'none'; return; }
            box.style.display = 'block';
            document.getElementById('txt-wand-name').innerText = spellName;
            document.getElementById('txt-wand-val').innerText = timerStr;
            document.getElementById('fill-wand').style.width = percent + '%';
        }
        
        function UpdateVoice(isTalking, rangeLevel, hexColor) {
            let circle = document.getElementById('voice-circle');
            let iconIdle = document.getElementById('voice-icon-idle');
            let iconActive = document.getElementById('voice-icon-active');
            
            circle.style.setProperty('--voice-color', hexColor);
            
            if (isTalking) {
                circle.classList.add('talking');
                iconIdle.style.opacity = '0';
                iconActive.style.opacity = '1';
            } else {
                circle.classList.remove('talking');
                iconIdle.style.opacity = '1';
                iconActive.style.opacity = '0';
            }
            
            for (let i = 1; i <= 3; i++) {
                let bar = document.getElementById('v-bar-' + i);
                if (isTalking && i <= rangeLevel) {
                    bar.style.backgroundColor = hexColor;
                } else if (i <= rangeLevel) {
                    bar.style.backgroundColor = 'rgba(100, 100, 100, 0.6)';
                } else {
                    bar.style.backgroundColor = 'rgba(40, 40, 40, 0.4)';
                }
            }
        }
    </script>
</body>
</html>
